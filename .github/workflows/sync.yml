name: Email sync
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
concurrency:
  group: email-sync
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node worker.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAIL_PW_ADMIN: ${{ secrets.MAIL_PW_ADMIN }}
          MAIL_PW_SALES: ${{ secrets.MAIL_PW_SALES }}
          MAIL_PW_CEDRIC: ${{ secrets.MAIL_PW_CEDRIC }}
          SMART_BCC_ADDRESS: ${{ secrets.SMART_BCC_ADDRESS }}
